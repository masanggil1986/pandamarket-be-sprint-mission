name: panda-market

services:
  db:
    image: postgres:latest
    container_name: panda-market-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: panda-market
    volumes:
      - panda-market-db:/var/lib/postgresql

  app:
    build: .
    depends_on:
      - db
    container_name: panda-market-app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/panda-market
      - JWT_ACCESS_TOKEN_SECRET=your-secret-key
      - JWT_REFRESH_TOKEN_SECRET=your-refresh-secret-key
    volumes:
      - ./public:/app/public

  proxy:
    depends_on:
      - app
    image: nginx:alpine
    container_name: panda-market-proxy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

volumes:
  panda-market-db: