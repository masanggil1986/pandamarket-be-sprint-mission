name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy source to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ec2-user/pandamarket-be-sprint-mission"
          overwrite: true

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/pandamarket-be-sprint-mission
            cat > .env << 'EOF'
            DATABASE_URL=postgresql://postgres:postgres@test-db.ctsku00y8ca4.ap-northeast-2.rds.amazonaws.com:5432/panda-market
            BASE_URL=http://localhost:3000
            PORT=3000
            JWT_ACCESS_TOKEN_SECRET=your-secret-key
            JWT_REFRESH_TOKEN_SECRET=your-refresh-secret-key
            EOF
            npm install
            npm run build
            npx prisma migrate deploy
            npx prisma generate
            pm2 delete API || true
            pm2 start ./build/main.js --name API
